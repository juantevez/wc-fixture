# =============================================================================
# nats.conf — Configuración de NATS JetStream para wc-fixture
# Usado en producción; en docker-compose se pasan flags directamente al binario.
# =============================================================================

# JetStream habilitado con almacenamiento en disco
jetstream {
  store_dir: "/data"
  max_memory_store: 256MB
  max_file_store: 4GB
}

# Servidor
port: 4222
http_port: 8222

# Logging
logtime: true
debug: false
trace: false

# Límites de conexión
max_connections: 1000
max_payload: 1MB

